<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Crear cuenta - Cloud Service</title>

  <!-- ICONO -->
  <link rel="icon" href="src/images/Imagen1.png">

  <!-- CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<!-- 🔷 NAVBAR -->
<header class="navbar">
  <div class="nav-left">
    <strong>Cloud Service</strong>
  </div>
  <div class="nav-right">
    <a href="login.html">Iniciar sesión</a>
    <a href="register.html">Crear cuenta</a>
    <a href="#">Ayuda</a>
  </div>
</header>

<!-- 🔷 FORMULARIO -->
<div class="register-container">

  <h1>Crear tu cuenta</h1>
  <p class="subtitle">Solo necesitas unos segundos</p>

  <div class="row">
    <input type="text" id="name" placeholder="Nombre">
    <input type="text" id="lastname" placeholder="Apellido">
  </div>

  <input type="email" id="email" placeholder="Correo electrónico">
  <input type="text" id="phone" placeholder="Teléfono">

  <select id="role">
    <option value="">Selecciona tu rol</option>
    <option value="Estudiante">Estudiante</option>
    <option value="Profesor">Profesor</option>
    <option value="Administrador">Administrador</option>
  </select>

  <input type="password" placeholder="Contraseña">
  <input type="password" placeholder="Confirmar contraseña">

  <!-- 🔥 BOTÓN ARREGLADO -->
  <button type="button" onclick="registrarUsuario()">
    Crear cuenta
  </button>

  <p class="link">
    ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
  </p>

</div>

<!-- 🔥 IMPORTANTE -->
<script src="js/app.js"></script>

</body>
</html>
